version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: video-player-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_player
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - video-player-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-player-backend
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres/video_player
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/uploads
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - video-player-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-player-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    networks:
      - video-player-network

volumes:
  postgres_data:

networks:
  video-player-network:
    driver: bridge
