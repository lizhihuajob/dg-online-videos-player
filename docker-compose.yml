version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: video-player-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: video_player
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    restart: unless-stopped
    networks:
      - video-player-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-player-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/video_player
      - SECRET_KEY=your-super-secret-key-change-in-production-at-least-32-characters
      - CORS_ORIGINS=["http://localhost:3000","http://localhost:5173","http://localhost"]
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - video-player-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-player-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - video-player-network

volumes:
  postgres_data:

networks:
  video-player-network:
    driver: bridge
