version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-player-backend
    ports:
      - "5000:5000"
    volumes:
      - backend-data:/app/data
    restart: unless-stopped
    networks:
      - video-player-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-player-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - video-player-network

networks:
  video-player-network:
    driver: bridge

volumes:
  backend-data:
