version: '3.8'

services:
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: video-player-frontend
    ports:
      - "3000:80"
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - video-player-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: video-player-backend
    restart: unless-stopped
    volumes:
      - video-player-data:/data
    networks:
      - video-player-network

volumes:
  video-player-data:

networks:
  video-player-network:
    driver: bridge
